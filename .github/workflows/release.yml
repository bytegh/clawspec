name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: clawspec-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        id: meta
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [[ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag ${RELEASE_TAG} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi
          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Check plugin entry
        run: npm run check

      - name: Run fast tests
        run: npm run test:fast

      - name: Run slow tests
        run: npm run test:slow

      - name: Pack tarball
        run: npm pack

  publish_npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm with trusted publishing
        run: npm publish --access public

  publish_clawhub:
    name: Publish ClawHub package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - verify
      - publish_npm
    permissions:
      contents: read
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify ClawHub token is configured
        shell: bash
        run: |
          if [[ -z "${CLAWHUB_TOKEN}" ]]; then
            echo "Missing CLAWHUB_TOKEN secret. Add it in GitHub repository settings before releasing."
            exit 1
          fi

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Login to ClawHub
        run: clawhub login --token "${CLAWHUB_TOKEN}"

      - name: Verify ClawHub identity
        run: clawhub whoami

      - name: Publish package to ClawHub
        shell: bash
        run: |
          SOURCE_COMMIT="$(git rev-parse HEAD)"
          clawhub --no-input package publish . \
            --source-repo "${GITHUB_REPOSITORY}" \
            --source-commit "${SOURCE_COMMIT}"

  create_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - verify
      - publish_npm
      - publish_clawhub
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        shell: bash
        run: |
          gh release create "${{ needs.verify.outputs.release_tag }}" \
            --title "ClawSpec ${{ needs.verify.outputs.release_tag }}" \
            --generate-notes
